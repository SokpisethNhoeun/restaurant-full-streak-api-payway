<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f8a7f" />
    <title>HappyBoat Offline</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #0f8a7f;
        --background: #fdfcf8;
        --foreground: #101827;
        --muted: #edf3f4;
        --border: #d7e0e3;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        place-items: center;
        padding: 24px;
      }
      section {
        width: min(100%, 420px);
        border: 1px solid var(--border);
        border-radius: 16px;
        background: #fff;
        padding: 24px;
        text-align: center;
        box-shadow: 0 18px 50px rgba(16, 24, 40, 0.08);
      }
      img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        object-fit: cover;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #52606d;
        font-size: 14px;
        line-height: 1.55;
      }
      button,
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 18px;
        border-radius: 12px;
        border: 0;
        background: var(--primary);
        color: #fff;
        padding: 0 18px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <img src="/icon-192.png" alt="HappyBoat" />
        <h1>You are offline</h1>
        <p>HappyBoat could not reach the network. Previously opened pages and cached menu images may still work.</p>
        <button type="button" onclick="window.location.reload()">Try again</button>
      </section>
    </main>
  </body>
</html>
